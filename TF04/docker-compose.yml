services:
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - ecommerce-net
    restart: unless-stopped

  backend1:
    build: ./backend
    container_name: ecommerce-backend1
    environment:
      - INSTANCE_ID=backend-1
      - PORT=5000
    networks:
      - ecommerce-net
    restart: unless-stopped

  backend2:
    build: ./backend
    container_name: ecommerce-backend2
    environment:
      - INSTANCE_ID=backend-2
      - PORT=5000
    networks:
      - ecommerce-net
    restart: unless-stopped

  backend3:
    build: ./backend
    container_name: ecommerce-backend3
    environment:
      - INSTANCE_ID=backend-3
      - PORT=5000
    networks:
      - ecommerce-net
    restart: unless-stopped

networks:
  ecommerce-net:
    driver: bridge

# Upstream com least_conn e health checks
upstream backend_pool {
    least_conn;

    server backend1:5000 max_fails=3 fail_timeout=30s;
    server backend2:5000 max_fails=3 fail_timeout=30s;
    server backend3:5000 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

# HTTP - redireciona para HTTPS
server {
    listen 80;
    server_name localhost ecommerce.local;

    # Nginx status (monitoramento)
    location /nginx-status {
        stub_status on;
        allow all;
    }

    # Health check global
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # Redireciona tudo para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - servidor principal
server {
    listen 443 ssl;
    server_name localhost ecommerce.local;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Frontend - loja virtual
    location / {
        root /usr/share/nginx/html/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        limit_req zone=general_limit burst=50 nodelay;
    }

    # API - proxy reverso para backend pool
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_pool/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Adiciona header com instância que respondeu
        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
    }

    # Admin panel
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index dashboard.html;
        limit_req zone=general_limit burst=20 nodelay;
    }

    # Nginx status
    location /nginx-status {
        stub_status on;
        allow all;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }
}
